<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Knowledge Chatbots 🌟</title>
<style>
  body {
    margin:0; 
    font-family: 'Poppins', sans-serif; 
    background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100vh; 
    color: #fff;
    text-align: center;
  }

  header {
    padding: 50px 20px 30px;
  }

  header h1 {
    font-size: 3rem;
    margin-bottom: 15px;
    text-shadow: 2px 2px 12px rgba(0,0,0,0.3);
  }

  header p {
    font-size: 1.2rem;
    margin-bottom: 40px;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.2);
  }

  .chatbot-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-bottom: 60px;
  }

  .chatbot-buttons a {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    padding: 20px 25px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 1.2rem;
    width: 150px;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  .chatbot-buttons a:hover {
    background: rgba(255,255,255,0.35);
    transform: translateY(-5px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.3);
  }

  .chatbot-buttons img {
    width: 60px;
    margin-bottom: 12px;
  }

  footer {
    margin-bottom: 30px;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>

<header>
  <h1>🌟 Welcome to Knowledge Chatbots Hub 🌟</h1>
  <p>Explore interactive chatbots for Planet info, Birds, GK, and Math. Click any to start learning instantly!</p>
</header>

<div class="chatbot-buttons">
  <a href="./PLANET.HTML">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Planet Icon">
    PLANET
  </a>
  <a href="./SCIENCE.HTML">
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Bird Icon">
    BIRDS
  </a>
  <a href="./GK.HTML">
    <img src="https://cdn-icons-png.flaticon.com/512/2922/2922506.png" alt="GK Icon">
    GK
  </a>
  <a href="./MATH.HTML">
    <img src="https://cdn-icons-png.flaticon.com/512/992/992651.png" alt="Math Icon">
    MATH
  </a>
</div>

<footer>
  Created by YourName | Interactive Chatbots for Fun & Learning 🧠✨
</footer>

</body>
</html>
